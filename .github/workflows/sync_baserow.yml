name: Handmatige Baserow Sync

on:
  workflow_dispatch: # Zorgt voor de handmatige trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch and Compare Data
        env:
          BASEROW_TOKEN: ${{ secrets.BASEROW_TOKEN }}
        run: python sync_data.py

      - name: Commit and Push if changed
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add data.json
          if git diff --staged --quiet; then
            echo "Geen wijzigingen gevonden."
          else
            git commit -m "Update Baserow data dump"
            git push
          fi