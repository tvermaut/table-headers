name: Handmatige Baserow Sync

on:
  workflow_dispatch:

# VOEG DIT TOE:
permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        # Optioneel: zorg dat checkout de juiste token gebruikt (meestal automatisch)
        
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Fetch and Compare Data
        run: python sync_data.py
        env:
          BASEROW_TOKEN: ${{ secrets.BASEROW_TOKEN }}

      - name: Debug - List files
        run: ls -la # Hierdoor zien we in de logs of data.json echt bestaat

      - name: Commit and Push if changed
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          
          # Check of het bestand bestaat voor we het toevoegen
          if [ -f data.json ]; then
            git add data.json
            if git diff --staged --quiet; then
              echo "Geen wijzigingen gevonden t.o.v. de vorige versie."
            else
              git commit -m "Update Baserow data dump"
              git push
            fi
          else
            echo "FOUT: data.json is niet gevonden!"
            exit 1
          fi