name: Handmatige Baserow Sync

on:
  workflow_dispatch:

# VOEG DIT TOE:
permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        # Optioneel: zorg dat checkout de juiste token gebruikt (meestal automatisch)
        
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      # ... rest van je stappen (install, fetch) ...

      - name: Commit and Push if changed
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add data.json
          if git diff --staged --quiet; then
            echo "Geen wijzigingen gevonden."
          else
            git commit -m "Update Baserow data dump"
            git push
          fi